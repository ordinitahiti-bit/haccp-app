<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HACCP Cloud PRO+</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --primary:#1A3A5C;
  --accent:#2E6DA4;
  --bg:#f4f7fb;
  --card:#ffffff;
  --ok:#d4edda;
  --err:#f8d7da;
}
body{font-family:system-ui;background:var(--bg);max-width:520px;margin:auto;padding:12px;color:#333}
h2{text-align:center;margin-bottom:10px}
.card{background:var(--card);padding:15px;border-radius:14px;margin-bottom:12px;box-shadow:0 4px 10px rgba(0,0,0,0.05)}
button{width:100%;padding:12px;border:none;border-radius:10px;font-weight:bold;margin-top:8px}
.btn-primary{background:var(--primary);color:white}
.btn-outline{background:white;border:2px solid var(--primary);color:var(--primary)}
input,select{width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;margin-top:6px;margin-bottom:8px}
.ok{background:var(--ok)}
.err{background:var(--err)}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.small{font-size:12px;color:#666}
</style>
</head>
<body>

<h2>🧊 HACCP Cloud PRO+</h2>

<div class="card">
  <div class="header">
    <b>⚙️ Configurazione</b>
    <span class="small">Locale</span>
  </div>
  <div id="setup"></div>
  <button class="btn-outline" onclick="addItem()">+ Aggiungi apparecchio</button>
  <button class="btn-primary" onclick="saveConfig()">💾 Salva configurazione</button>
</div>

<div class="card">
  <div class="header">
    <b>📋 Rilevazioni</b>
    <button onclick="exportExcel()" style="width:auto;padding:6px 10px">⬇️ Excel</button>
  </div>
  <div id="main"></div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyZsu2-x5UrResgnArJvE60zwhhtezUoRoG64cphvxPGWukuvOxdvDQguTrrKpYhGSH/exec";

let config = JSON.parse(localStorage.getItem('config')) || [];
let storico = JSON.parse(localStorage.getItem('storico')) || [];

function addItem(name="", type="frigo", area="CUCINA", limit="") {
  const div = document.createElement('div');
  div.className='card';
  div.innerHTML=`
  <input class="name" placeholder="Nome apparecchio" value="${name}">
  <select class="area">
    <option ${area==='CUCINA'?'selected':''}>CUCINA</option>
    <option ${area==='BAR'?'selected':''}>BAR</option>
    <option ${area==='RISTORANTE'?'selected':''}>RISTORANTE</option>
  </select>
  <select class="type">
    <option value="frigo" ${type==='frigo'?'selected':''}>Frigo</option>
    <option value="gelo" ${type==='gelo'?'selected':''}>Congelatore</option>
  </select>
  <input type="number" class="limit" placeholder="Limite °C" value="${limit || (type==='frigo'?4:-18)}">
  `;
  document.getElementById('setup').appendChild(div);
}

function saveConfig() {
  config=[];
  document.querySelectorAll('#setup .card').forEach(c=>{
    const name=c.querySelector('.name').value;
    const area=c.querySelector('.area').value;
    const type=c.querySelector('.type').value;
    const limit=parseFloat(c.querySelector('.limit').value);
    if(name) config.push({name,area,type,limit});
  });
  localStorage.setItem('config',JSON.stringify(config));
  render();
}

function render() {
  const main=document.getElementById('main');
  main.innerHTML='';
  config.forEach(item=>{
    const div=document.createElement('div');
    div.className='card';
    div.innerHTML=`
      <b>${item.name}</b><br>
      <span class="small">${item.area} • limite ${item.limit}°C</span>
      <input type="number" placeholder="Inserisci temperatura" onchange="send(this,'${item.name}')">
    `;
    main.appendChild(div);
  });
}

async function send(el,name) {
  const val=parseFloat(el.value);
  const item=config.find(i=>i.name===name);
  const ok = val<=item.limit;

  el.classList.remove('ok','err');
  el.classList.add(ok?'ok':'err');

  const now=new Date();

  const data={
    name,
    temp:val,
    area:item.area,
    date:now.toLocaleDateString('it-IT'),
    time:now.toLocaleTimeString('it-IT'),
    status: ok?'OK':'ERR'
  };

  storico.push(data);
  localStorage.setItem('storico',JSON.stringify(storico));

  try {
    await fetch(URL,{method:'POST',mode:'no-cors',body:JSON.stringify(data)});
    if(!ok) alert('⚠️ Temperatura fuori norma!');
  } catch(e){alert('Errore invio');}
}

function exportExcel(){
  const wb = XLSX.utils.book_new();

  const aree = ['CUCINA','BAR','RISTORANTE'];

  aree.forEach(area=>{
    const dati = storico.filter(s=>s.area===area);
    const ws = XLSX.utils.json_to_sheet(dati);
    XLSX.utils.book_append_sheet(wb, ws, area);
  });

  XLSX.writeFile(wb, 'HACCP_Storico.xlsx');
}

config.forEach(c=>addItem(c.name,c.type,c.area,c.limit));
render();
</script>

</body>
</html>
