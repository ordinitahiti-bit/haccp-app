<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>HACCP Cloud - 3 Zone</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --navy: #1A3A5C; --blue: #2E6DA4; --gray: #f0f4f8; --border: #dde3ea; --red: #9B1C1C; }
  body { font-family: system-ui, sans-serif; background: var(--gray); max-width: 500px; margin: 0 auto; padding: 10px; }
  .screen { display: none; padding: 10px; }
  .screen.active { display: block; }
  .card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 12px; }
  .area-selector { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
  .area-btn { flex: 1; min-width: 100px; padding: 10px 5px; border: 2px solid var(--navy); border-radius: 8px; background: white; color: var(--navy); font-weight: bold; cursor: pointer; font-size: 13px; }
  .area-btn.active { background: var(--navy); color: white; }
  input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; font-size: 16px; }
  button { width: 100%; padding: 14px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; }
  .btn-primary { background: var(--navy); color: white; }
  .btn-outline { background: white; color: var(--navy); border: 2px solid var(--navy); margin-top: 10px; }
  .btn-danger { background: white; color: var(--red); border: 2px solid var(--red); margin-top: 10px; }
  .history-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .history-table th, .history-table td { padding: 8px; border-bottom: 1px solid var(--border); text-align: left; }
</style>
</head>
<body>

<!-- SETUP -->
<div id="screen-setup" class="screen">
  <h2>⚙️ Configurazione Locali</h2>
  <div id="setup-container"></div>
  <button class="btn-outline" onclick="addSetupItem()">+ Aggiungi Apparecchio</button>
  <button class="btn-primary" onclick="saveSetup()" style="margin-top:20px;">Salva e Inizia</button>
  <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ccc;">
  <button class="btn-danger" onclick="resetApp()">🗑️ Reset Totale App</button>
</div>

<!-- MAIN -->
<div id="screen-main" class="screen active">
  <h2>📝 Registro HACCP</h2>
  <div class="area-selector">
    <button id="btn-CUCINA" class="area-btn active" onclick="setArea('CUCINA')">🍳 CUCINA</button>
    <button id="btn-BAR" class="area-btn" onclick="setArea('BAR')">☕ BAR</button>
    <button id="btn-RISTORANTE" class="area-btn" onclick="setArea('RISTORANTE')">🍽️ RISTO</button>
  </div>
  <div id="input-container"></div>
  
  <div style="margin-top: 20px;">
    <button class="btn-outline" onclick="showSetupScreen()">⚙️ Modifica Apparecchi</button>
    <button class="btn-primary" onclick="showScreen('screen-history'); loadCloudData()" style="margin-top: 10px;">📜 Storico Cloud</button>
  </div>
</div>

<!-- HISTORY -->
<div id="screen-history" class="screen">
  <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:15px;">
    <h2>☁️ Storico</h2>
    <button onclick="showScreen('screen-main')" style="width:auto; padding:5px 10px;">⬅️ Indietro</button>
  </div>
  <select id="filter-area" onchange="renderHistoryTable()">
    <option value="ALL">Tutti i locali</option>
    <option value="CUCINA">Solo Cucina</option>
    <option value="BAR">Solo Bar</option>
    <option value="RISTORANTE">Solo Ristorante</option>
  </select>
  <div class="card" style="overflow-x:auto;">
    <table class="history-table">
      <thead><tr><th>Ora</th><th>Locale</th><th>Nome</th><th>Temp</th></tr></thead>
      <tbody id="history-body"></tbody>
    </table>
  </div>
</div>

<script>
  // LA TUA STRINGA CLOUD PERSONALE
  const G_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZsu2-x5UrResgnArJvE60zwhhtezUoRoG64cphvxPGWukuvOxdvDQguTrrKpYhGSH/exec";
  
  let config = JSON.parse(localStorage.getItem('haccp_config')) || [];
  let currentArea = 'CUCINA';
  let cloudData = [];

  function init() {
    if (config.length > 0) { 
      showScreen('screen-main'); 
      renderMain(); 
    } else { 
      showSetupScreen(); 
    }
  }

  function setArea(area) {
    currentArea = area;
    document.querySelectorAll('.area-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + area).classList.add('active');
    renderMain();
  }

  function showSetupScreen() {
    document.getElementById('setup-container').innerHTML = '';
    if (config.length === 0) {
      addSetupItem();
    } else {
      config.forEach(c => addSetupItem(c.name, c.type, c.area));
    }
    showScreen('screen-setup');
  }

  function addSetupItem(name="", type="frigo", area="CUCINA") {
    const container = document.getElementById('setup-container');
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <input type="text" class="setup-name" value="${name}" placeholder="Nome frigo...">
      <select class="setup-area">
        <option value="CUCINA" ${area==='CUCINA'?'selected':''}>Cucina</option>
        <option value="BAR" ${area==='BAR'?'selected':''}>Bar</option>
        <option value="RISTORANTE" ${area==='RISTORANTE'?'selected':''}>Ristorante</option>
      </select>
      <select class="setup-type">
        <option value="frigo" ${type==='frigo'?'selected':''}>Frigo (+4°C)</option>
        <option value="gelo" ${type==='gelo'?'selected':''}>Gelo (-18°C)</option>
      </select>`;
    container.appendChild(div);
  }

  function saveSetup() {
    const names = document.querySelectorAll('.setup-name');
    const types = document.querySelectorAll('.setup-type');
    const areas = document.querySelectorAll('.setup-area');
    config = [];
    names.forEach((n, i) => { 
      if(n.value.trim() !== "") config.push({ name: n.value.trim(), type: types[i].value, area: areas[i].value }); 
    });
    localStorage.setItem('haccp_config', JSON.stringify(config));
    showScreen('screen-main'); 
    renderMain();
  }

  function resetApp() {
    if(confirm("Attenzione: vuoi cancellare tutta la configurazione dal telefono? I dati sul Cloud rimarranno salvi.")) {
      localStorage.removeItem('haccp_config');
      config = [];
      showSetupScreen();
    }
  }

  function renderMain() {
    const container = document.getElementById('input-container');
    container.innerHTML = '';
    const filteredConfig = config.filter(c => c.area === currentArea);
    
    if(filteredConfig.length === 0) {
      container.innerHTML = \`<p style="text-align:center; padding:20px;">Nessun frigo in \${currentArea}.<br>Clicca "Modifica Apparecchi" per aggiungerli.</p>\`;
      return;
    }

    filteredConfig.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = \`
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <strong>\${item.name}</strong>
          <input type="number" step="0.1" placeholder="°C" style="width:80px; margin:0;" onchange="sendData('\${item.name}','\${item.type}',this)">
        </div>\`;
      container.appendChild(card);
    });
  }

  async function sendData(name, type, el) {
    const val = el.value; if(!val) return;
    el.disabled = true;
    const now = new Date();
    const entry = {
      date: now.toLocaleDateString('it-IT'),
      time: now.toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'}),
      name, type, temp: val, area: currentArea,
      status: (type==='frigo' && val<=4) || (type==='gelo' && val<=-18) ? "OK" : "ERR"
    };

    try {
      await fetch(G_SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(entry) });
      alert("✅ Salvato in " + currentArea);
      el.value = "";
    } catch (e) { alert("❌ Errore Cloud!"); }
    el.disabled = false;
  }

  async function loadCloudData() {
    const res = await fetch(G_SCRIPT_URL);
    cloudData = await res.json();
    renderHistoryTable();
  }

  function renderHistoryTable() {
    const filter = document.getElementById('filter-area').value;
    const body = document.getElementById('history-body');
    body.innerHTML = '';
    
    cloudData.filter(r => filter === 'ALL' || r[6] === filter).reverse().forEach(r => {
      body.innerHTML += \`<tr><td>\${r[0]} \${r[1]}</td><td>\${r[6]}</td><td>\${r[2]}</td><td>\${r[4]}°</td></tr>\`;
    });
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  init();
</script>
</body>
</html>
